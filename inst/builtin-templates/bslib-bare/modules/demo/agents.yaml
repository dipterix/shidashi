tools:
- name: hello_world
  category:
  - exploratory
  enabled: yes
- name: shiny_input_info
  category:
  - exploratory
  enabled: ["Plan", "Executing"]
- name: shiny_output_info
  category:
  - exploratory
  enabled: ["Plan", "Executing"]
- name: shiny_query_ui
  category:
  - exploratory
  enabled: ["Plan", "Executing"]
- name: shiny_query_ui_result
  category:
  - exploratory
  enabled: ["Plan", "Executing"]
- name: shiny_input_update
  category:
  - executing
  - destructive
  enabled: ["Executing"]
- name: trigger_refresh
  category:
  - executing
  enabled: ["Executing"]
skills:
- name: greet
  category:
  - executing
  # default permissions (readme, references, scripts) to all
  enabled: yes
  # permission override for specific scripts
  scripts:
  - name: greet.R
    enabled: ["Executing"]
    category:
    - destructive
parameters:
  system_prompt: You are an R shiny expert. You have access to the shiny application
    via provided tools.
  default_mode: "Plan"
modes:
- name: Ask
  description: "Ask general questions about the module, no user data access"
- name: Plan
  description: "With data access, no code execution"
- name: Executing
  description: "With data access, with code execution"
